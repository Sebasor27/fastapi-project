services:
  backend:
    build: ./backend
    restart: always
    environment:
      - SECRET_KEY=tuclavesecreta
      - DATABASE_URL=sqlite+aiosqlite:///./app.db
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend